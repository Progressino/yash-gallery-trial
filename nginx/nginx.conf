worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Increase buffer sizes for large file uploads
    client_max_body_size 500m;
    # Fresh reload + Tier-1 Flipkart multi-year ZIP parse can take several minutes.
    # If you still see 502 through Cloudflare, raise CF origin timeout or set the DNS record to
    # “DNS only” (grey cloud) so CF’s ~100s limit does not kill long uploads.
    proxy_read_timeout 900s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;

    # ── HTTP on localhost — /api for same-host health checks & tooling ────────
    # Deploy workflow + curl http://127.0.0.1/api/health hit this block. Backend is
    # not published on host :8000 in prod compose (internal only), so /api must
    # proxy through nginx on port 80 for localhost/127.0.0.1.
    server {
        listen 80 default_server;
        server_name localhost 127.0.0.1;

        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto http;
            proxy_read_timeout 900s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 900s;
        }

        location / {
            return 404;
        }
    }

    # ── HTTP → HTTPS redirect (public hostname) ─────────────────
    server {
        listen 80;
        server_name app.progressino.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name app.progressino.com;

        ssl_certificate     /etc/letsencrypt/live/app.progressino.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.progressino.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index index.html;

        # index.html — never cache so Cloudflare always serves the latest bundle
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            try_files $uri /index.html;
        }

        # JS/CSS assets have content-hash filenames — cache aggressively
        location ~* \.(js|css|woff2?|ttf|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # React SPA — serve index.html for all unknown routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy all /api/* requests to FastAPI backend
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Forward cookies for session management
            proxy_pass_header  Set-Cookie;
        }

        # Gzip static assets
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        gzip_min_length 1000;
    }
}
