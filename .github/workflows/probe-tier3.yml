name: Probe Tier-3 June window

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /root/app
    steps:
      - name: Sync repo
        run: |
          set -eu
          git fetch origin main
          git checkout -f main
          git reset --hard origin/main
      - name: Tier-3 June 1-4 probe
        run: |
          set -eu
          if docker compose version >/dev/null 2>&1; then DC="docker compose"; else DC="docker-compose"; fi
          $DC -f docker-compose.prod.yml exec -T backend python3 scripts/vps_probe_tier3_june.py
