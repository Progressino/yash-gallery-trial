name: Renew TLS Certificate

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

jobs:
  renew:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /root/app
    steps:
      - name: Ensure certbot installed
        run: |
          set -eu
          if command -v certbot >/dev/null 2>&1; then
            exit 0
          fi
          if ! command -v apt-get >/dev/null 2>&1; then
            echo "ERROR: certbot missing and apt-get unavailable."
            exit 1
          fi
          apt-get update -y
          DEBIAN_FRONTEND=noninteractive apt-get install -y certbot

      - name: Renew app.progressino.com cert
        run: |
          set -eu
          timeout 120s certbot renew \
            --cert-name app.progressino.com \
            --non-interactive \
            --quiet \
            --deploy-hook "docker compose -f /root/app/docker-compose.prod.yml exec -T frontend nginx -s reload"
          openssl x509 -in /etc/letsencrypt/live/app.progressino.com/fullchain.pem -noout -dates
