name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /root/app
    steps:
      - name: Pull latest code
        run: git pull origin main

      - name: Rebuild and restart containers
        run: |
          docker compose -f docker-compose.prod.yml up -d --build
          docker image prune -f

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost/api/health || curl -sf http://localhost:8000/api/health || echo "Health check skipped"
