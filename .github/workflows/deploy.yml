name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /root/app
    steps:
      - name: Sync repo to origin/main
        run: |
          mkdir -p /root/app-data/postgres /root/app-data/finance
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Predeploy sanity gate (backend + frontend smoke)
        run: |
          bash scripts/predeploy_sanity.sh

      - name: Rebuild and restart containers
        run: |
          docker compose -f docker-compose.prod.yml build
          docker compose -f docker-compose.prod.yml up -d --remove-orphans
          docker image prune -f || true

      - name: Health check
        run: |
          sleep 8
          curl -sf http://localhost/api/health || curl -sf http://localhost:8000/api/health || echo "Health check skipped"
