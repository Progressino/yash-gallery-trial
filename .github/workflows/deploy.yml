name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd ~/app
          git pull origin main

      - name: Rebuild and restart containers
        run: |
          cd ~/app
          docker compose -f docker-compose.prod.yml up -d --build
          docker image prune -f
