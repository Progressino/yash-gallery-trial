name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      no_cache:
        description: "docker build --no-cache (clean rebuild; uses much more RAM — avoid on small VPS)"
        type: boolean
        default: false

# Only one deploy at a time; newer pushes cancel older queued/in-progress deploys.
concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Sync checkout to /root/app
        run: |
          set -eu
          APP_DIR=/root/app
          mkdir -p /root/app-data/postgres /root/app-data/finance
          mkdir -p "$APP_DIR"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.local-data' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '.env' \
            --exclude 'po_raise_archive_dev' \
            "$GITHUB_WORKSPACE/" "$APP_DIR/"
          cd "$APP_DIR"
          _SHA="$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD 2>/dev/null || echo deploy)"
          _BUILT="$(date -u +%Y-%m-%dT%H:%MZ)"
          for _KV in "APP_GIT_SHA=${_SHA}" "APP_BUILT_AT=${_BUILT}"; do
            _K="${_KV%%=*}"
            _V="${_KV#*=}"
            if grep -q "^${_K}=" .env 2>/dev/null; then
              sed -i "s|^${_K}=.*|${_K}=${_V}|" .env
            else
              echo "${_K}=${_V}" >> .env
            fi
          done
          if grep -q '^SESSION_PG_PERSIST=' .env 2>/dev/null; then
            sed -i 's/^SESSION_PG_PERSIST=.*/SESSION_PG_PERSIST=0/' .env
          else
            echo 'SESSION_PG_PERSIST=0' >> .env
          fi
          sed -i '/^WARM_CACHE_PO_SESSION_ONLY=/d' .env 2>/dev/null || true
          if grep -q 'rt-backend' nginx/nginx.conf; then
            echo "FATAL: nginx/nginx.conf references rt-backend — use backend (progressino compose service name)." >&2
            exit 1
          fi
          if grep -q "raisinghanitextiles.com" nginx/nginx.conf && grep -q "acme-challenge" nginx/nginx.conf; then
            cp nginx/nginx.conf /etc/nginx-vps/nginx.conf
          fi
          echo "Deployed SHA ${_SHA} to ${APP_DIR}"

      # Never block deploy on diagnostics (docker/python quirks on self-hosted).
      - name: Tooling snapshot (debug)
        continue-on-error: true
        run: |
          set -eu
          command -v docker && docker --version || true
          command -v python3 && python3 --version || true
          command -v bash && bash -c 'printf "bash OK (BASH_VERSION=%s)\n" "${BASH_VERSION:-?}"' || true

      # Lightweight syntax check — app stays running, no heavy pytest.
      # Full test suite runs locally before push (VPS can't afford pytest + app together).
      - name: Quick import check (no stop)
        continue-on-error: true
        timeout-minutes: 1
        run: |
          cd /root/app
          python3 -c "import backend.main; print('backend.main imports OK')" 2>&1 || true
          python3 -c "import backend.routers.data; print('routers.data imports OK')" 2>&1 || true

      - name: Ensure firewall allows web traffic
        run: |
          set -eu
          if command -v ufw >/dev/null 2>&1 && ufw status 2>/dev/null | grep -q "Status: active"; then
            ufw allow 80/tcp comment 'HTTP public web' >/dev/null 2>&1 || true
            ufw allow 443/tcp comment 'HTTPS public web' >/dev/null 2>&1 || true
            echo "UFW web rules:"
            ufw status numbered | sed -n '1,15p'
          else
            echo "UFW not active — skipping web allow rules"
          fi

      - name: Rebuild and restart containers
        run: |
          set -eu
          cd /root/app
          _dc() {
            if docker compose version >/dev/null 2>&1; then
              docker compose "$@"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose "$@"
            else
              echo "ERROR: neither 'docker compose' nor docker-compose found." >&2
              exit 1
            fi
          }
          COMPOSE_PROJECT="${COMPOSE_PROJECT_NAME:-progressino}"
          exec 200>/var/lock/yash-gallery-deploy.lock
          if ! flock -w 1800 200; then
            echo "ERROR: another deploy is still running (lock held >30m)." >&2
            exit 1
          fi
          _prune_stale_compose_containers() {
            local svc="$1"
            local canonical="${COMPOSE_PROJECT}-${svc}-1"
            docker ps -a --format '{{.ID}}\t{{.Names}}' | while IFS=$'\t' read -r id name; do
              [ -n "$id" ] || continue
              name="${name#/}"
              case "$name" in
                *${COMPOSE_PROJECT}-${svc}*)
                  if [ "$name" != "$canonical" ]; then
                    echo "Removing stale container: ${name} (${id})"
                    docker rm -f "$id" 2>/dev/null || true
                  fi
                  ;;
              esac
            done
          }
          _prune_ghost_recreate_containers() {
            docker ps -a --format '{{.ID}}\t{{.Names}}' | while IFS=$'\t' read -r id name; do
              [ -n "$id" ] || continue
              name="${name#/}"
              case "$name" in
                *_${COMPOSE_PROJECT}-*)
                  echo "Removing ghost recreate container: ${name} (${id})"
                  docker rm -f "$id" 2>/dev/null || true
                  ;;
              esac
            done
          }
          _force_remove_all_progressino_containers() {
            docker ps -a --format '{{.ID}}\t{{.Names}}' | while IFS=$'\t' read -r id name; do
              [ -n "$id" ] || continue
              name="${name#/}"
              case "$name" in
                ${COMPOSE_PROJECT}-*)
                  echo "Force removing progressino container: ${name} (${id})"
                  docker rm -f "$id" 2>/dev/null || true
                  ;;
              esac
            done
          }
          _prune_stale_compose_containers backend
          _prune_stale_compose_containers stitching-backend
          _prune_stale_compose_containers frontend
          _prune_stale_compose_containers autoheal
          _prune_ghost_recreate_containers
          docker container prune -f 2>/dev/null || true
          _dc -p "${COMPOSE_PROJECT}" -f docker-compose.prod.yml kill 2>/dev/null || true
          _dc -p "${COMPOSE_PROJECT}" -f docker-compose.prod.yml down --volumes=false --remove-orphans 2>/dev/null || true
          _force_remove_all_progressino_containers

          _NO_CACHE=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.no_cache }}" = "true" ]; then
            _NO_CACHE="--no-cache"
          fi
          _dc -p "${COMPOSE_PROJECT}" -f docker-compose.prod.yml build ${_NO_CACHE} backend stitching-backend
          _dc -p "${COMPOSE_PROJECT}" -f docker-compose.prod.yml build ${_NO_CACHE} frontend
          _force_remove_all_progressino_containers
          _dc -p "${COMPOSE_PROJECT}" -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
          docker image prune -f || true

      - name: Enable PostgreSQL query analytics (pg_stat_statements)
        run: |
          set -eu
          cd /root/app
          chmod +x scripts/pg_enable_stat_statements.sh scripts/pg_slow_queries.sh
          bash scripts/pg_enable_stat_statements.sh

      - name: Renew TLS certificate (app.progressino.com)
        continue-on-error: true
        run: |
          set -eu
          mkdir -p /var/www/certbot/.well-known/acme-challenge
          if ! command -v certbot >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -y
              DEBIAN_FRONTEND=noninteractive apt-get install -y certbot
            else
              echo "WARN: certbot not installed and apt-get unavailable; skipping TLS renewal."
              exit 0
            fi
          fi
          timeout 180s certbot renew \
            --cert-name app.progressino.com \
            --non-interactive \
            --deploy-hook "docker compose -p progressino -f /root/app/docker-compose.prod.yml exec -T frontend nginx -s reload" \
            || true
          if [ -f /etc/letsencrypt/live/app.progressino.com/fullchain.pem ]; then
            _EXP0="$(openssl x509 -in /etc/letsencrypt/live/app.progressino.com/fullchain.pem -noout -enddate | cut -d= -f2)"
            _EXP0_EPOCH="$(date -d "${_EXP0}" +%s 2>/dev/null || true)"
            _NOW_EPOCH="$(date +%s)"
            if [ -n "${_EXP0_EPOCH}" ] && [ "${_EXP0_EPOCH}" -le "${_NOW_EPOCH}" ]; then
              certbot certonly \
                --webroot -w /var/www/certbot \
                -d app.progressino.com \
                --non-interactive \
                --agree-tos \
                --register-unsafely-without-email \
                --keep-until-expiring || true
              docker compose -p progressino -f /root/app/docker-compose.prod.yml exec -T frontend nginx -s reload || true
            fi
          fi
          if [ -f /etc/letsencrypt/live/app.progressino.com/fullchain.pem ]; then
            openssl x509 -in /etc/letsencrypt/live/app.progressino.com/fullchain.pem -noout -dates || true
            _EXP="$(openssl x509 -in /etc/letsencrypt/live/app.progressino.com/fullchain.pem -noout -enddate | cut -d= -f2)"
            _EXP_EPOCH="$(date -d "${_EXP}" +%s 2>/dev/null || true)"
            _NOW_EPOCH="$(date +%s)"
            if [ -n "${_EXP_EPOCH}" ] && [ "${_EXP_EPOCH}" -le "${_NOW_EPOCH}" ]; then
              echo "WARN: TLS certificate is still expired after renewal attempt."
            fi
          fi

      - name: Health check
        run: |
          set -eu
          if ! command -v curl >/dev/null 2>&1; then
            echo "WARN: curl not installed — skipping HTTP health probe."
            exit 0
          fi
          for i in $(seq 1 24); do
            if curl -sf --connect-timeout 5 "http://127.0.0.1:8000/api/health" \
              && curl -sf --connect-timeout 5 "http://127.0.0.1/api/health"; then
              echo "OK: health check passed (attempt $i)"
              exit 0
            fi
            echo "… waiting for /api/health (backend :8000 + nginx :80) attempt $i/24"
            sleep 5
          done
          echo "ERROR: health check failed after retries"
          exit 1

      - name: Reconcile latest Existing PO on disk
        continue-on-error: true
        run: |
          set -eu
          cd /root/app
          bash scripts/reconcile-existing-po-production.sh

      - name: Reconcile latest inventory history on disk
        continue-on-error: true
        run: |
          set -eu
          cd /root/app
          bash scripts/reconcile-inventory-history-production.sh

      - name: Warm shared PO cache (PO Fresh defaults)
        continue-on-error: true
        run: |
          set -eu
          cd /root/app
          bash scripts/run-po-warmup-production.sh

      - name: Warm Intelligence bundle (default 30D window)
        continue-on-error: true
        run: |
          set -eu
          cd /root/app
          bash scripts/run-intelligence-warmup-production.sh

      - name: Backend logs (on failure)
        if: failure()
        run: |
          set +e
          docker ps -a --filter name=progressino-backend 2>&1 || true
          docker ps -a --filter name=progressino-frontend 2>&1 || true
          if docker compose version >/dev/null 2>&1; then
            docker compose -p progressino -f /root/app/docker-compose.prod.yml logs --tail=120 backend 2>&1 || true
            docker compose -p progressino -f /root/app/docker-compose.prod.yml ps 2>&1 || true
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose -p progressino -f /root/app/docker-compose.prod.yml logs --tail=120 backend 2>&1 || true
            docker-compose -p progressino -f /root/app/docker-compose.prod.yml ps 2>&1 || true
          fi
