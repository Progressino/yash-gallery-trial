version: "3.9"

# Production compose — used on the VPS.
# Cloudflare sits in front and handles HTTPS → this server serves HTTP on port 80.
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d --build

services:

  # ── PostgreSQL — durable forecast/upload session blobs ───────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: forecast
      POSTGRES_PASSWORD: ${FORECAST_PG_PASSWORD:-forecast}
      POSTGRES_DB: forecast
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.save=on
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=1536MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
    mem_limit: 2g
    shm_size: 1g
    volumes:
      - ${APP_DATA_DIR:-/root/app-data}/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecast -d forecast"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  # ── FastAPI backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      # Emergency stabilization: keep Intelligence aligned with loaded uploaded data
      - DASHBOARD_UPLOAD_DAY_GATE=0
      # Lock Tier-1 bulk uploads / clear / reset for non-Admin roles (daily uploads only).
      - UPLOAD_HISTORICAL_LOCKED=1
      - FORECAST_SESSION_DATABASE_URL=postgresql://forecast:${FORECAST_PG_PASSWORD:-forecast}@postgres:5432/forecast
      # Set SESSION_PG_PERSIST=0 to disable multi‑GB session ZIP writes (warm cache + Tier‑3 hold data).
      # Off by default — multi-GB session ZIP writes duplicate warm cache and OOM the host.
      - SESSION_PG_PERSIST=${SESSION_PG_PERSIST:-0}
      - SESSION_PG_MAX_BUNDLE_MB=${SESSION_PG_MAX_BUNDLE_MB:-200}
      # Disable PostgreSQL normalized tables (load_warm_cache_tables / load_shared_snapshot).
      # This feature reads ALL platform rows from forecast_sales_transactions on every restart
      # (58-84s unbounded SELECT), consuming 2-3 GB extra RAM and causing OOM crashes.
      # The disk warm cache (/data/warm_cache) serves the same data faster and without OOM risk.
      - FORECAST_OPS_PG=0
      # Disable MTR row-count guard so accounts with <500K rows use fast-path from disk cache.
      - WARM_CACHE_MIN_MTR_ROWS=0
      - SESSION_SHARED_FRAMES=1
      # Limit Tier-3 SQLite restore to the last 2 months to avoid loading 12 months of
      # platform DataFrames into memory on every session restore (prevents OOM on 5.5 GB VPS).
      # The warm cache disk already contains full bulk history; only recent deltas are needed.
      - AUTO_RESTORE_MONTHS=2
      - SESSION_MAX_ACTIVE=4
      # Disable background Intelligence bundle precompute on startup to prevent a concurrent
      # 1-2 GB build_sales_df spike while session hydration is also running. The bundle is
      # built on first request (2-3s delay) rather than consuming an extra 1-2 GB at startup.
      - INTELLIGENCE_PRECOMPUTE=0
      - WARM_CACHE_DIR=/data/warm_cache
      - DB_POOL_SIZE=2
      - DB_POOL_MAX_OVERFLOW=3
      - FINANCE_DB_PATH=/data/finance.db
      - ITEM_DB_PATH=/data/items.db
      - SALES_DB_PATH=/data/sales.db
      - PRODUCTION_DB_PATH=/data/production.db
      - GREY_DB_PATH=/data/grey.db
      - PURCHASE_DB_PATH=/data/purchase.db
      - TNA_DB_PATH=/data/tna.db
      - USERS_DB_PATH=/data/users.db
      - MARKETPLACE_DB_PATH=/data/marketplace.db
      - STITCHING_DB_PATH=/data/stitching_costing.db
      - HRM_DB_PATH=/data/hrm.db
      - MARKETPLACE_ENCRYPTION_KEY=${MARKETPLACE_ENCRYPTION_KEY}
      # Myntra date bucketing: use dispatch/shipment date so monthly totals align with
      # seller DSR (Myntra Seller Hub reports are dispatch-date filtered).
      # The 60-day lag cap in the parser prevents future dispatch-date artifacts.
      - MYNTRA_USE_DISPATCH_DATE=1
      - PO_RESULT_SPILL_DIR=/data/po_results
    volumes:
      - ${APP_DATA_DIR:-/root/app-data}/finance:/data
    expose:
      - "8000"          # docker network; nginx uses backend:8000
    # Loopback-only publish so same-host deploy health + curl work without going through nginx/TLS.
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Cap below host RAM so the kernel OOM-killer targets this container, not ssh/postgres.
    # Warm cache peaks ~5–6 GB; 2 GiB swap covers brief spikes. Host: 7.8 GiB + 2 GiB swap.
    mem_limit: 5.5g
    memswap_limit: 7g
    # Single worker on 7.5 GB VPS — dual workers OOM during parallel warm-cache boot.
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    restart: unless-stopped
    labels:
      - autoheal=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:8000/api/health > /dev/null",
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 600s

  # ── Stitching backend — isolated service for /api/stitching/* and /api/auth/* ─
  # Separate process from main backend; rebuilt on deploy with the same backend image.
  # Shares the finance data volume (stitching_costing.db).
  stitching-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ${APP_DATA_DIR:-/root/app-data}/finance:/data
    expose:
      - "8001"
    ports:
      - "127.0.0.1:8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    command: ["uvicorn", "backend.stitching_app:app", "--host", "0.0.0.0", "--port", "8001", "--workers", "1"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8001/api/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Restarts backend (and any labeled service) when Docker marks it unhealthy.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=600
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── React frontend + nginx reverse proxy ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_GIT_SHA: ${APP_GIT_SHA:-dev}
        VITE_APP_BUILT_AT: ${APP_BUILT_AT:-}
    volumes:
      # Override default nginx config with our custom one (SPA routing + API proxy)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's Encrypt certificates (obtained via certbot on the host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # ACME webroot for certbot HTTP-01 challenges.
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped
